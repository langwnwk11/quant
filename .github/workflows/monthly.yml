# 每月执行一次，
#获取a股所有股票的代码和名称
#获取a股的交易日期
name: update_montly

on:
  schedule:
    # 北京时间每月 1 号上午 09:00 运行 (UTC 01:00)
    - cron: '0 1 1 * *'
  workflow_dispatch: # 允许你手动点击按钮随时测试执行

jobs:
  execute-notebook:
    runs-on: ubuntu-latest
    # 授予写入权限，否则无法将生成的 parquet 文件 push 回仓库
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 自动缓存依赖，加快下次运行速度

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Notebook
        run: |
          python scripts/fetch_base_data.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 这一步非常重要：添加所有产生的 parquet 文件
          git add data/baseData/*.parquet
          
          # 只有在有文件变动时才提交，防止脚本报错
          if git diff --staged --quiet; then
            echo "No changes in baseData. Skipping commit."
          else
            git commit -m "Auto-update factors data: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
