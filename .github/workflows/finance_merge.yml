name: Merge Financial Data

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'The run ID of the source workflow'
        required: true
        type: string
        # 注意：这里不能直接在 run_id 下面写默认值，除非使用 default 关键字
        

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    permissions: # 关键补充：下载其他 workflow 的 artifact 需要读取权限
      contents: read
      actions: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pandas pyarrow huggingface_hub

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: finalized-financial-data
          path: finalized-financial-data
          # 这里使用默认的 github token 即可，但需确保 permissions 已声明
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.inputs.run_id }}

      - name: Run Merge Script
        # 确保你的文件名是 merg_financials.py (检查拼写是否带 e)
        run: python scripts/merg_financials.py finalized-financial-data

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path='finalized-financial-data',
              repo_id='langwnwk/stock_finance',
              repo_type='dataset',
              token='${{ secrets.HF_TOKEN }}'
          )"
